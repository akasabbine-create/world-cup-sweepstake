<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup Sweepstake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🏆 Live World Cup Sweepstake</h1>
    <p id="updated">Loading...</p>
  </header>

  <main class="grid">
    <section class="panel main">
      <h2>Leaderboard</h2>
      <table>
        <thead><tr><th>#</th><th>Player</th><th>Teams</th><th>Pts</th></tr></thead>
        <tbody id="leaderboard"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>⚽ Match Centre</h2>
      <div id="matches"></div>
    </section>

    <section class="panel">
      <h2>🔥 Big Moments</h2>
      <div id="events"></div>
    </section>

    <section class="panel">
      <h2>📊 Insights</h2>
      <div id="insights"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
