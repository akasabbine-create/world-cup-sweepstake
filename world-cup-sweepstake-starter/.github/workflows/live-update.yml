name: Live World Cup Sweepstake Update

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/update.py

      - name: Commit updates
        run: |
          git config user.name "sweepstake-bot"
          git config user.email "sweepstake-bot@users.noreply.github.com"
          git add data/*.json
          git commit -m "live update" || exit 0
          git push
